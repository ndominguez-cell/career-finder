services:
  - type: web
    name: career-finder-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter # Playwright requires decent RAM (~2GB)
    region: ohio
    envVars:
      - key: PORT
        value: "8000"
      - key: OPENAI_API_KEY
        sync: false
      - key: SEARCHAPI_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.10.0"
    healthCheckPath: /health
